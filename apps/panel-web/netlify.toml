[build]
command = "npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm build:panel-web"
publish = "apps/panel-web/.next"

[build.environment]
NODE_VERSION = "20"
NEXT_TELEMETRY_DISABLED = "1"
NEXT_PUBLIC_API_URL = "https://backend-production-60016.up.railway.app"

[[plugins]]
package = "@netlify/plugin-nextjs"
