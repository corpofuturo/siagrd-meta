name: Deploy SATAM / SIAGRD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy al VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /root/backups/siagrd
            echo '0 2 * * * root cd /srv/siagrd && docker compose exec -T postgres pg_dump -U $POSTGRES_USER $POSTGRES_DB > /root/backups/siagrd/db_$(date +\%Y\%m\%d).sql && find /root/backups/siagrd -name "*.sql" -mtime +30 -delete' > /etc/cron.d/siagrd-backup
            cd /srv/siagrd
            git pull origin main
            docker compose --env-file .env up -d --build
            echo "✅ SATAM desplegado correctamente"
