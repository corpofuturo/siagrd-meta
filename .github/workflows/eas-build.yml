name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/socorro/**'
      - 'apps/ciudadano/**'

jobs:
  build-socorro:
    name: Build Socorro (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v2
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build Socorro APK
        working-directory: apps/socorro
        run: eas build --platform android --profile preview --non-interactive

  build-ciudadano:
    name: Build Ciudadano (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v2
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build Ciudadano APK
        working-directory: apps/ciudadano
        run: eas build --platform android --profile preview --non-interactive
