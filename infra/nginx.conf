upstream backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream panel_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

# api.satam.corpofuturo.org → backend Fastify
server {
    listen 80;
    server_name api.satam.corpofuturo.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.satam.corpofuturo.org;

    ssl_certificate     /etc/letsencrypt/live/api.satam.corpofuturo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.satam.corpofuturo.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 15M;

    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache para archivos estáticos servidos por el backend
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff2)$ {
        proxy_pass http://backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# panel.satam.corpofuturo.org → Next.js standalone
server {
    listen 80;
    server_name panel.satam.corpofuturo.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name panel.satam.corpofuturo.org;

    ssl_certificate     /etc/letsencrypt/live/panel.satam.corpofuturo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.satam.corpofuturo.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    location / {
        proxy_pass         http://panel_web;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://panel_web;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
