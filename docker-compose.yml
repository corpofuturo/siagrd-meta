version: '3.9'

# ── Producción — DigitalOcean Droplet ──────────────────────────────────────
# Uso: docker compose --env-file .env up -d
# Logs:  docker compose logs -f backend
# Smoke: curl http://localhost:3000/api/v1/health

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siagrd}
      POSTGRES_USER: ${POSTGRES_USER:-siagrd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [siagrd-net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-siagrd} -d ${POSTGRES_DB:-siagrd}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    networks: [siagrd-net]
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [siagrd-net]
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  panel-web:
    build:
      context: .
      dockerfile: apps/panel-web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3001'
    depends_on:
      backend:
        condition: service_healthy
    networks: [siagrd-net]
    expose:
      - '3001'

volumes:
  postgres_data:

networks:
  siagrd-net:
    driver: bridge
