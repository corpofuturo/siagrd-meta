[build]
  builder = "DOCKERFILE"
  dockerfilePath = "backend/Dockerfile"
  # El build context debe ser la raíz del monorepo para que COPY pnpm-lock.yaml funcione
  buildContext = "."

[deploy]
  numReplicas = 1
  sleepApplication = false
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
  startCommand = "node dist/index.js"

[[services]]
  internalPort = 3000
  protocol = "TCP"
